<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: #000;
    padding: 20px;
}

.sidebar h2 {
    color: #1db954;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Search */
input {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin-bottom: 20px;
}

/* Song list */
.song {
    padding: 10px;
    background: #1e1e1e;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.song:hover {
    background: #333;
}

/* Player */
.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181818;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.controls button {
    background: #1db954;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 50%;
    cursor: pointer;
}

.controls button:hover {
    background: #17a34a;
}

.progress {
    width: 50%;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>🎧 Music</h2>
        <p>Playlist</p>
        <div id="playlist"></div>
    </div>

    <div class="main">
        <input type="text" id="search" placeholder="🔍 Rechercher...">
        <div id="songs"></div>
    </div>

</div>

<div class="player">
    <div>
        <strong id="currentSong">Aucune musique</strong>
    </div>

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playSong()">▶</button>
        <button onclick="pauseSong()">⏸</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="progress" class="progress" value="0">
</div>

<audio id="audio"></audio>

<script>
// Liste des musiques
const songs = [
    { name: "Song 1", src: "music1.mp3" },
    { name: "Song 2", src: "music2.mp3" },
    { name: "Song 3", src: "music3.mp3" }
];

let currentIndex = 0;

const audio = document.getElementById("audio");
const songsContainer = document.getElementById("songs");
const playlist = document.getElementById("playlist");
const currentSongText = document.getElementById("currentSong");
const search = document.getElementById("search");
const progress = document.getElementById("progress");

// Charger liste
function loadSongs(filter = "") {
    songsContainer.innerHTML = "";
    songs.forEach((song, index) => {
        if (song.name.toLowerCase().includes(filter.toLowerCase())) {
            let div = document.createElement("div");
            div.className = "song";
            div.innerText = song.name;
            div.onclick = () => playIndex(index);
            songsContainer.appendChild(div);
        }
    });
}

// Playlist sidebar
function loadPlaylist() {
    playlist.innerHTML = "";
    songs.forEach((song, index) => {
        let div = document.createElement("div");
        div.className = "song";
        div.innerText = song.name;
        div.onclick = () => playIndex(index);
        playlist.appendChild(div);
    });
}

// Lecture
function playIndex(index) {
    currentIndex = index;
    audio.src = songs[index].src;
    audio.play();
    currentSongText.innerText = songs[index].name;
}

function playSong() {
    audio.play();
}

function pauseSong() {
    audio.pause();
}

function nextSong() {
    currentIndex = (currentIndex + 1) % songs.length;
    playIndex(currentIndex);
}

function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    playIndex(currentIndex);
}

// Progress bar
audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

// Recherche
search.addEventListener("input", (e) => {
    loadSongs(e.target.value);
});

// Init
loadSongs();
loadPlaylist();
</script>

</body>
</html>
