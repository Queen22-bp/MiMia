<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b141a;
    color: white;
}

/* LOGIN */
#login {
    padding: 20px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 100%;
}

/* CHAT */
#chat {
    padding: 10px;
    height: 75vh;
    overflow-y: auto;
}

.message {
    max-width: 70%;
    padding: 10px;
    margin: 6px;
    border-radius: 12px;
}

.me {
    background: #005c4b;
    margin-left: auto;
}

.other {
    background: #202c33;
}

img {
    max-width: 200px;
    border-radius: 10px;
}

/* INPUT */
.input-box {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: #202c33;
}

input[type="text"] {
    flex: 1;
    border: none;
    padding: 10px;
    background: #2a3942;
    color: white;
}

button {
    padding: 10px;
    background: #00a884;
    border: none;
    color: white;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Connexion</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="register()">S'inscrire</button>
    <button onclick="login()">Connexion</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;"></div>

<div class="input-box" id="inputBox" style="display:none;">
    <input type="text" id="msg" placeholder="Message...">
    <input type="file" id="file">
    <button onclick="send()">Envoyer</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
    getFirestore, collection, addDoc, onSnapshot, query, orderBy, setDoc, doc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { 
    getStorage, ref, uploadBytes, getDownloadURL 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const chat = document.getElementById("chat");

// 🔐 REGISTER
window.register = async () => {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
};

// 🔐 LOGIN
window.login = async () => {
    await signInWithEmailAndPassword(auth, email.value, password.value);
};

// 👤 USER CONNECTÉ
onAuthStateChanged(auth, async (user) => {

    if (user) {

        login.style.display = "none";
        chat.style.display = "block";
        inputBox.style.display = "flex";

        // statut en ligne
        await setDoc(doc(db, "users", user.uid), {
            email: user.email,
            online: true
        });

        loadMessages();
    }
});

// 📩 ENVOYER MESSAGE
window.send = async () => {

    const text = msg.value;
    const file = document.getElementById("file").files[0];

    let imageUrl = "";

    if (file) {
        const storageRef = ref(storage, "images/" + file.name);
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    await addDoc(collection(db, "messages"), {
        text,
        image: imageUrl,
        user: auth.currentUser.email,
        time: Date.now()
    });

    msg.value = "";
};

// 🔄 TEMPS RÉEL
function loadMessages() {

    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {

        chat.innerHTML = "";

        snapshot.forEach(doc => {

            const data = doc.data();

            const div = document.createElement("div");

            div.className = "message " + (data.user === auth.currentUser.email ? "me" : "other");

            div.innerHTML = `
                <b>${data.user}</b><br>
                ${data.text || ""}
                ${data.image ? `<br><img src="${data.image}">` : ""}
            `;

            chat.appendChild(div);
        });

        chat.scrollTop = chat.scrollHeight;
    });
}

</script>

</body>
</html>
