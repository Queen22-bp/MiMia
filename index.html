<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMia 💬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{display:flex;height:100vh;background:#0f172a;color:white}

/* CHAT */
.sidebar{width:30%;background:#111827}
.chat-area{flex:1;display:flex;flex-direction:column}
.messages{flex:1;padding:10px;overflow:auto}
.message{padding:10px;margin:5px;border-radius:10px;max-width:70%}
.me{background:#22c55e;margin-left:auto}
.other{background:#374151}

.input-area{display:flex;padding:10px;background:#020617}
input{flex:1;padding:10px;border-radius:20px;border:none}
button{margin-left:10px;padding:10px;background:#22c55e;border:none;border-radius:20px;color:white}

/* PLAYER */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  padding:10px;
}

#search{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
  margin-bottom:5px;
}

.song{
  padding:8px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}
.song:hover{background:#1f2937}

.controls{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="chat-area">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="Message...">
    <button onclick="sendMessage()">Envoyer</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player">

  🔍 <input id="search" placeholder="Rechercher musique..." oninput="searchMusic()">

  <div id="songList"></div>

  <audio id="audio" controls></audio>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="shuffle()">🔀</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  projectId: "TON_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let userId;

auth.signInAnonymously().then(u=>{
  userId = u.user.uid;
});

// CHAT
function sendMessage(){
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  db.collection("messages").add({
    text: input.value,
    user: userId,
    time: Date.now()
  });

  input.value="";
}

db.collection("messages").orderBy("time")
.onSnapshot(snap=>{
  const div = document.getElementById("messages");
  div.innerHTML="";

  snap.forEach(doc=>{
    const d = doc.data();
    const m = document.createElement("div");

    m.className = "message " + (d.user===userId?"me":"other");
    m.innerText = d.text;

    div.appendChild(m);
  });

  div.scrollTop = div.scrollHeight;
});

// 🎧 MUSIQUE INTELLIGENTE
const songs = [
  {title:"Chill Vibes", url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
  {title:"Relax Beat", url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
  {title:"Energy", url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
];

let currentIndex = 0;

function renderSongs(list){
  const container = document.getElementById("songList");
  container.innerHTML="";

  list.forEach((song,i)=>{
    const div = document.createElement("div");
    div.className="song";
    div.innerText = song.title;
    div.onclick = ()=>playSong(i);
    container.appendChild(div);
  });
}

function playSong(i){
  const audio = document.getElementById("audio");
  currentIndex = i;
  audio.src = songs[i].url;
  audio.play();
}

// recherche
function searchMusic(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = songs.filter(s=>s.title.toLowerCase().includes(q));
  renderSongs(filtered);
}

// suivant
function nextSong(){
  currentIndex = (currentIndex+1)%songs.length;
  playSong(currentIndex);
}

// précédent
function prevSong(){
  currentIndex = (currentIndex-1+songs.length)%songs.length;
  playSong(currentIndex);
}

// shuffle intelligent
function shuffle(){
  currentIndex = Math.floor(Math.random()*songs.length);
  playSong(currentIndex);
}

// auto next
document.getElementById("audio").addEventListener("ended", nextSong);

// initial
renderSongs(songs);
</script>

</body>
</html>
