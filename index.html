<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Online Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 250px;
    background: #000;
    padding: 20px;
}

.sidebar h2 {
    color: #1db954;
}

.main {
    flex: 1;
    padding: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
}

.song {
    padding: 12px;
    background: #1e1e1e;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.song:hover {
    background: #333;
}

#player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181818;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>🎧 Music</h2>
        <p>Recherche en ligne</p>
    </div>

    <div class="main">
        <input type="text" id="search" placeholder="🔍 Rechercher une musique...">
        <div id="results"></div>
    </div>

</div>

<div id="player"></div>

<script>

const results = document.getElementById("results");
const search = document.getElementById("search");
const player = document.getElementById("player");

// 🔑 TA CLÉ API
const apiKey = "TA_CLE_API";

// 🔍 Recherche en ligne
async function searchMusic(query) {

    if (!query) return;

    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${query}&key=${apiKey}`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        results.innerHTML = "";

        data.items.forEach(item => {

            const title = item.snippet.title;
            const videoId = item.id.videoId;

            const div = document.createElement("div");
            div.className = "song";
            div.innerText = title;

            div.onclick = () => play(videoId, title);

            results.appendChild(div);
        });

    } catch (e) {
        results.innerHTML = "<p>Erreur de connexion</p>";
    }
}

// ▶️ Lecture
function play(videoId, title) {
    player.innerHTML = `
        <p style="padding:10px;">▶️ ${title}</p>
        <iframe width="100%" height="250"
        src="https://www.youtube.com/embed/${videoId}?autoplay=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
        </iframe>
    `;
}

// 🔍 Event recherche
search.addEventListener("input", (e) => {
    searchMusic(e.target.value);
});

</script>

</body>
</html>
