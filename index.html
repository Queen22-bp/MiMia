<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #121212;
    color: white;
}

header {
    background: #000;
    padding: 15px;
    text-align: center;
    color: #1db954;
    font-size: 22px;
}

.container {
    padding: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: #1db954;
    color: white;
    cursor: pointer;
    margin-bottom: 20px;
}

.song {
    padding: 12px;
    background: #1e1e1e;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.song:hover {
    background: #333;
}

#player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181818;
    padding: 10px;
}
</style>

</head>

<body>

<header>🎧 Music Pro</header>

<div class="container">

    <!-- RECHERCHE -->
    <input type="text" id="search" placeholder="🔍 Rechercher...">

    <!-- AJOUT MUSIQUE -->
    <input type="text" id="urlInput" placeholder="URL du fichier MP3">
    <input type="text" id="titleInput" placeholder="Titre">
    <input type="text" id="artistInput" placeholder="Artiste">

    <button onclick="uploadFromURL()">Ajouter musique</button>

    <!-- LISTE -->
    <div id="songs"></div>

</div>

<!-- PLAYER -->
<div id="player"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔑 CONFIG (À REMPLACER)
const firebaseConfig = {
    apiKey: "TON_API_KEY",
    authDomain: "TON_PROJET.firebaseapp.com",
    projectId: "TON_PROJET",
    storageBucket: "TON_PROJET.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// DOM
const songsDiv = document.getElementById("songs");
const search = document.getElementById("search");
const player = document.getElementById("player");

let songsList = [];

// 🔄 CHARGER MUSIQUES
async function loadSongs() {

    const snapshot = await getDocs(collection(db, "songs"));

    songsList = [];

    snapshot.forEach(doc => {
        songsList.push(doc.data());
    });

    displaySongs(songsList);
}

// 📄 AFFICHAGE
function displaySongs(list) {

    songsDiv.innerHTML = "";

    list.forEach(song => {

        const div = document.createElement("div");
        div.className = "song";

        div.innerHTML = `
            <strong>${song.title}</strong><br>
            <small>${song.artist || ""}</small>
        `;

        div.onclick = () => playSong(song);

        songsDiv.appendChild(div);
    });
}

// ▶️ LECTURE
function playSong(song) {

    player.innerHTML = `
        <p>▶️ ${song.title}</p>
        <audio controls autoplay style="width:100%;">
            <source src="${song.url}" type="audio/mp3">
        </audio>
    `;
}

// 🔍 RECHERCHE
search.addEventListener("input", (e) => {

    const value = e.target.value.toLowerCase();

    const filtered = songsList.filter(song =>
        song.title.toLowerCase().includes(value) ||
        (song.artist && song.artist.toLowerCase().includes(value))
    );

    displaySongs(filtered);
});

// 🚀 UPLOAD DEPUIS URL
window.uploadFromURL = async function() {

    const url = document.getElementById("urlInput").value;
    const title = document.getElementById("titleInput").value;
    const artist = document.getElementById("artistInput").value;

    if (!url || !title) {
        alert("Titre et URL obligatoires");
        return;
    }

    try {
        const response = await fetch(url);
        const blob = await response.blob();

        const fileName = "music_" + Date.now() + ".mp3";

        const storageRef = ref(storage, "songs/" + fileName);

        await uploadBytes(storageRef, blob);

        const downloadURL = await getDownloadURL(storageRef);

        await addDoc(collection(db, "songs"), {
            title: title,
            artist: artist,
            url: downloadURL
        });

        alert("✅ Musique ajoutée !");
        loadSongs();

    } catch (error) {
        console.error(error);
        alert("❌ Erreur upload");
    }
};

// INIT
loadSongs();

</script>

</body>
</html>
