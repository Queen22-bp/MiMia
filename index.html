<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMia PRO 💬🎧</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{display:flex;height:100vh;background:#0f172a;color:white}

/* LAYOUT */
.app{display:flex;width:100%}

/* SIDEBAR */
.sidebar{
  width:25%;
  background:#020617;
  padding:10px;
  border-right:1px solid #1f2937;
}

.logo{font-size:20px;font-weight:bold;margin-bottom:10px}

/* CHAT */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.message{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#22c55e;margin-left:auto}
.other{background:#374151}

.input-area{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
}

/* PLAYER */
.player{
  width:30%;
  background:#020617;
  padding:10px;
  border-left:1px solid #1f2937;
}

#search{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
  margin-bottom:5px;
}

.song{
  padding:8px;
  border-bottom:1px solid #1f2937;
  cursor:pointer;
}

.song:hover{background:#1f2937}

.fav{
  float:right;
  cursor:pointer;
}

.controls{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">MiMia 💬🎧</div>
</div>

<!-- CHAT -->
<div class="chat-area">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" placeholder="Écrire un message...">
    <button onclick="sendMessage()">Envoyer</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player">

  🔍 <input id="search" placeholder="Rechercher musique..." onkeyup="searchMusic()">

  <div id="results"></div>

  <audio id="audio" controls></audio>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="next()">⏭</button>
    <button onclick="shuffle()">🔀</button>
  </div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  projectId: "TON_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let userId;

// 🔐 AUTH
auth.signInAnonymously().then(u=>{
  userId = u.user.uid;
});

// 💬 CHAT
function sendMessage(){
  const input = document.getElementById("msgInput");
  if(!input.value.trim()) return;

  db.collection("messages").add({
    text: input.value,
    user: userId,
    time: Date.now()
  });

  input.value="";
}

db.collection("messages").orderBy("time")
.onSnapshot(snapshot=>{
  const div = document.getElementById("messages");
  div.innerHTML="";

  snapshot.forEach(doc=>{
    const d = doc.data();
    const m = document.createElement("div");

    m.className = "message " + (d.user===userId ? "me" : "other");
    m.innerText = d.text;

    div.appendChild(m);
  });

  div.scrollTop = div.scrollHeight;
});

// 🎧 MUSIQUE
let history = [];
let current = 0;

function play(url,title){
  const audio = document.getElementById("audio");
  audio.src = url;
  audio.play();

  history.push({url,title});
  current = history.length-1;
}

// 🔍 API Deezer
async function searchMusic(){
  const q = document.getElementById("search").value;

  if(q.length < 2) return;

  const res = await fetch("https://api.allorigins.win/raw?url=https://api.deezer.com/search?q=" + q);
  const data = await res.json();

  const div = document.getElementById("results");
  div.innerHTML = "";

  data.data.slice(0,10).forEach(song=>{
    const el = document.createElement("div");
    el.className = "song";

    el.innerHTML = `
      🎵 ${song.title} - ${song.artist.name}
      <span class="fav" onclick="addFav('${song.preview}','${song.title}')">❤️</span>
    `;

    el.onclick = ()=>play(song.preview, song.title);

    div.appendChild(el);
  });
}

// ⏭ CONTROLES
function next(){
  if(history.length){
    current = (current+1)%history.length;
    play(history[current].url, history[current].title);
  }
}

function prev(){
  if(history.length){
    current = (current-1+history.length)%history.length;
    play(history[current].url, history[current].title);
  }
}

function shuffle(){
  if(history.length){
    current = Math.floor(Math.random()*history.length);
    play(history[current].url, history[current].title);
  }
}

// ❤️ FAVORIS
function addFav(url,title){
  let favs = JSON.parse(localStorage.getItem("favs") || "[]");
  favs.push({url,title});
  localStorage.setItem("favs", JSON.stringify(favs));
  alert("Ajouté aux favoris ❤️");
}

// ▶️ AUTO NEXT
document.getElementById("audio").addEventListener("ended", next);
</script>

</body>
      </html>
